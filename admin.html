<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crox Love Log</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 30px;
            color: #fff;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 10px;
        }

        .header p {
            color: #888;
            font-size: 1.1em;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .stat-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 15px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .stat-box h3 {
            font-size: 2.5em;
            color: #ff6b6b;
            margin-bottom: 5px;
        }

        .stat-box p {
            color: #aaa;
        }

        .refresh-btn {
            display: block;
            margin: 0 auto 30px;
            padding: 15px 40px;
            font-size: 1.1em;
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 107, 107, 0.4);
        }

        .entries-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .entry {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 4px solid #ff6b6b;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .entry:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateX(10px);
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .entry-number {
            background: #ff6b6b;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
        }

        .entry-date {
            color: #888;
            font-size: 0.9em;
        }

        .entry-message {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 15px;
            line-height: 1.8;
            color: #eee;
            font-size: 1.1em;
            white-space: pre-wrap;
        }

        .entry-answers {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .answer-tag {
            background: rgba(76, 175, 80, 0.3);
            color: #4CAF50;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85em;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state h2 {
            font-size: 2em;
            margin-bottom: 15px;
            color: #444;
        }

        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .password-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .password-box h2 {
            margin-bottom: 20px;
            color: #ff6b6b;
        }

        .password-box input {
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #444;
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.3);
            color: white;
            width: 250px;
            margin-bottom: 15px;
            text-align: center;
        }

        .password-box input:focus {
            outline: none;
            border-color: #ff6b6b;
        }

        .password-box button {
            padding: 12px 40px;
            font-size: 1em;
            background: linear-gradient(45deg, #ff6b6b, #ee5a6f);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .password-box button:hover {
            transform: scale(1.05);
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <!-- Password Protection -->
    <div class="password-screen" id="passwordScreen">
        <div class="password-box">
            <h2>🔒 Enter Password</h2>
            <input type="password" id="passwordInput" placeholder="Password" onkeypress="if(event.key==='Enter')checkPassword()">
            <br>
            <button onclick="checkPassword()">Unlock</button>
        </div>
    </div>

    <!-- Main Content -->
    <div id="mainContent" class="hidden">
        <div class="header">
            <h1>💝 Crox Love Log</h1>
            <p>Secret messages from your love</p>
        </div>

        <div class="stats">
            <div class="stat-box">
                <h3 id="totalCount">0</h3>
                <p>Total Messages</p>
            </div>
            <div class="stat-box">
                <h3 id="todayCount">0</h3>
                <p>Today</p>
            </div>
            <div class="stat-box">
                <h3 id="lastEntry">-</h3>
                <p>Last Entry</p>
            </div>
        </div>

        <button class="refresh-btn" onclick="loadEntries()">🔄 Refresh Log</button>

        <div class="entries-container" id="entriesContainer">
            <div class="empty-state">
                <h2>No messages yet...</h2>
                <p>Waiting for her to write something beautiful 💕</p>
            </div>
        </div>
    </div>

    <script>
        const CORRECT_PASSWORD = 'crox123'; // Change this to your password

        function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            if (input === CORRECT_PASSWORD) {
                document.getElementById('passwordScreen').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');
                loadEntries();
            } else {
                alert('Wrong password!');
                document.getElementById('passwordInput').value = '';
            }
        }

        async function loadEntries() {
            const container = document.getElementById('entriesContainer');
            
            try {
                // Try to load from server
                const response = await fetch('/api/get-answers');
                let entries = [];
                
                if (response.ok) {
                    entries = await response.json();
                } else {
                    // Fallback to localStorage
                    entries = JSON.parse(localStorage.getItem('croxLoveAnswers') || '[]');
                }
                
                // Reverse to show newest first
                entries = entries.reverse();
                
                updateStats(entries);
                
                if (entries.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <h2>No messages yet...</h2>
                            <p>Waiting for her to write something beautiful 💕</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = entries.map((entry, index) => {
                    const date = new Date(entry.timestamp);
                    const dateStr = date.toLocaleString('en-US', {
                        weekday: 'short',
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    
                    return `
                        <div class="entry">
                            <div class="entry-header">
                                <span class="entry-number">#${entries.length - index}</span>
                                <span class="entry-date">${dateStr}</span>
                            </div>
                            <div class="entry-message">${escapeHtml(entry.loveMessage || 'No message')}</div>
                            <div class="entry-answers">
                                <span class="answer-tag">❤️ Loves Crox: ${entry.lovesCrox ? 'Yes' : 'No'}</span>
                                <span class="answer-tag">✓ Sure: ${entry.isSure ? 'Yes' : 'No'}</span>
                            </div>
                        </div>
                    `;
                }).join('');
                
            } catch (e) {
                container.innerHTML = `
                    <div class="empty-state">
                        <h2>Error loading entries</h2>
                        <p>${e.message}</p>
                    </div>
                `;
            }
        }

        function updateStats(entries) {
            document.getElementById('totalCount').textContent = entries.length;
            
            const today = new Date().toDateString();
            const todayEntries = entries.filter(e => new Date(e.timestamp).toDateString() === today);
            document.getElementById('todayCount').textContent = todayEntries.length;
            
            if (entries.length > 0) {
                const lastDate = new Date(entries[entries.length - 1].timestamp);
                document.getElementById('lastEntry').textContent = lastDate.toLocaleDateString();
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Load entries on page load (if password already entered)
        if (!document.getElementById('passwordScreen').classList.contains('hidden')) {
            // Wait for password
        } else {
            loadEntries();
        }
    </script>
</body>
</html>
